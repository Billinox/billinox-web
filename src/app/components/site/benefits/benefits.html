<section class="py-24">
  <div class="mx-auto max-w-7xl px-4">
    <div class="mx-auto max-w-2xl text-center">
      <span
        class="inline-block rounded-full bg-muted px-3 py-1 text-xs font-semibold uppercase tracking-wider text-muted-foreground"
      >
        Why Billinox
      </span>
      <h2 class="mt-4 font-display text-3xl font-bold sm:text-5xl">
        Why businesses love Billinox
      </h2>
      <p class="mt-4 text-muted-foreground">
        Built around the way modern teams actually work — fast, focused, and
        uncompromising on craft.
      </p>
    </div>

    <div class="mt-14 grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
      @for (b of benefits; track $index) {
        <div
          class="rounded-2xl border border-border bg-card p-6 shadow-soft transition hover:-translate-y-0.5 hover:shadow-elevated"
        >
          <div
            class="grid h-11 w-11 place-items-center rounded-xl bg-secondary text-primary"
          >
            <svg class="h-5 w-5" [lucideIcon]="b.icon"></svg>
          </div>
          <h3 class="mt-4 font-display text-lg font-semibold">{{ b.title }}</h3>
          <p class="mt-1.5 text-sm text-muted-foreground">{{ b.desc }}</p>
        </div>
      }
    </div>
  </div>
</section>
