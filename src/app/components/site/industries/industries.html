<section class="bg-surface py-24">
      <div class="mx-auto max-w-7xl px-4">
        <div class="mx-auto max-w-2xl text-center">
          <span class="inline-block rounded-full bg-card px-3 py-1 text-xs font-semibold uppercase tracking-wider text-muted-foreground">
            Built for everyone
          </span>
          <h2 class="mt-4 font-display text-3xl font-bold sm:text-5xl">
            One platform, every industry
          </h2>
          <p class="mt-4 text-muted-foreground">
            From solo freelancers to multi-branch retail — Billinox adapts to how you work.
          </p>
        </div>

        <div class="mt-12 grid grid-cols-2 gap-3 sm:grid-cols-3 lg:grid-cols-7">
         @for (i of industries; track $index) {
            <div
              class="group flex flex-col items-center gap-3 rounded-2xl border border-border bg-card px-4 py-6 text-center shadow-soft transition hover:-translate-y-1 hover:border-primary/40"
            >
              <div class="grid h-12 w-12 place-items-center rounded-2xl bg-primary/15 text-secondary transition group-hover:bg-gold">
                <svg [lucideIcon]="i.icon" class="h-6 w-6"></svg>
              </div>
              <span class="text-sm font-semibold">{{i.name}}</span>
            </div>
         }
        </div>
      </div>
    </section>
