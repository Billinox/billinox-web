<section id="testimonials" class="bg-surface py-24">
  <div class="mx-auto max-w-7xl px-4">
    <div class="mx-auto max-w-2xl text-center">
      <span
        class="inline-block rounded-full bg-card px-3 py-1 text-xs font-semibold uppercase tracking-wider text-muted-foreground"
      >
        Loved by teams
      </span>
      <h2 class="mt-4 font-display text-3xl font-bold sm:text-5xl">
        Trusted by thousands of businesses
      </h2>
    </div>

    <div class="mt-14 grid gap-5 md:grid-cols-2 lg:grid-cols-4">
      @for (t of testimonials; track $index) {
        <figure
          class="flex h-full flex-col rounded-2xl border border-border bg-card p-6 shadow-soft transition hover:-translate-y-1 hover:shadow-elevated"
        >
          <div class="flex gap-0.5 text-primary">
            @for (i of [1, 2, 3, 4, 5]; track $index) {
              <svg key="{i}" class="h-4 w-4 fill-current" lucideStar />
            }
          </div>
          <blockquote
            class="mt-4 flex-1 text-sm leading-relaxed text-foreground/90"
          >
            "{{ t.quote }}"
          </blockquote>
          <figcaption
            class="mt-5 flex items-center gap-3 border-t border-border pt-4"
          >
            <div
              class="grid h-10 w-10 place-items-center rounded-full bg-gold text-xs font-bold text-secondary"
            >
              {{ t.initials }}
            </div>
            <div>
              <div class="text-sm font-semibold">{{ t.name }}</div>
              <div class="text-xs text-muted-foreground">{{ t.role }}</div>
            </div>
          </figcaption>
        </figure>
      }
    </div>
  </div>
</section>
